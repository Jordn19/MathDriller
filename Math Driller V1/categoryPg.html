<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Math Driller</title>

    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="nav-top-layout">Math Driller</header>

      <h1 id="page-subtitle">Select Category</h1>
  
    <main>
<nav> 
<div class="selection-grid" id="exercise-grid">
</div>
</nav>
    </main>

    <script>

const urlParams = new URLSearchParams (window.location.search);
const subject = urlParams.get('subject') || 'arithmetic';

document.getElementById ('page-subtitle').innerText = `Select ${subject.charAt(0).toUpperCase() + subject.slice(1)} Exercise`;

const grid = document.getElementById('exercise-grid');
fetch('exercises.json')
.then(response => response.json())
.then(dynamicExercises => {

const exercisesList = dynamicExercises[subject] || ["Coming soon...", "Coming soon..", "Coming soon..."];

exercisesList.forEach(exerciseName => {
  const boxLink = document.createElement('a');
boxLink.innerText = exerciseName;

boxLink.href = `questionPg.html?subject=${subject}&exercise=${encodeURIComponent(exerciseName)}`;
grid.appendChild(boxLink);
});

})
.catch(error => {
 console.error("Could not load exercises:", error);
});

    </script>
  </body>
</html>
