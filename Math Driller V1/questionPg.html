<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Math Driller</title>

     <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
    <h1 id="page-subtitle">Exercise Name</h1>
    </header>

    <main class="whitebox-layout">
<div class="white-box">
<div id="question-state" class="whitebox-states">
<div class="math-problem" id="question-text">Loading...</div>
</div>

<div id="answer-state"  class="whitebox-states hidden">
  <div class="math-problem" id="answer-text">Loading...</div>
</div>
</div>
    </main>

<div class="reset-btn">
  <button Id="next-btn" class="action-btn">Reset Problem</button>
</div>

<script src="generators.js"></script>

<script>
const urlParams = new URLSearchParams(window.location.search);
const exercise = urlParams.get('exercise') || 'Exercise'

const pageSubtitle = document.getElementById('page-subtitle');
pageSubtitle.innerText = exercise; 

const whiteBox =document.querySelector('.white-box');
const questionState = document.getElementById('question-state');
const answerState = document.getElementById('answer-state')

const questionText =document.getElementById('question-text');
const answerText =document.getElementById('answer-text');
const nextBtn =document.getElementById('next-btn');

function generateProblem(){
  answerState.classList.add('hidden');
  questionState.classList.remove('hidden');
  pageSubtitle.innerText = exercise;

if (window.mathGenerators && window.mathGenerators[exercise]) {
  const problem = window.mathGenerators[exercise]();
  questionText.innerText = problem.q;
  answerText.innerText = problem.a;
} else {
  questionText.innerText = "Problem coming soon!"
  answerText.innerText = "N/A";
}
}

whiteBox.addEventListener('click', () => {
  if(answerState.classList.contains('hidden')) {
    questionState.classList.add('hidden');
    answerState.classList.remove('hidden');
    pageSubtitle.innerText = "Answer";
  } else {
    answerState.classList.add('hidden');
    questionState.classList.remove('hidden');
    pageSubtitle.innerText = exercise;
  }
});

    </script>
  </body>
</html>
